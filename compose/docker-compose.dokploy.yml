# AgentHub v2 — Dokploy-local overlay
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dokploy.yml up -d
#
# When PROVISIONER_MODE=dokploy-local, AgentHub delegates workspace
# provisioning to a Dokploy instance running alongside the rest of the stack.
# Dokploy itself is a single container (plus the Docker socket it needs).
#
# IMPORTANT LICENSE NOTE — Dokploy ships with a dual license (LICENSE +
# LICENSE_PROPRIETARY). This overlay runs the image as published; we don't
# redistribute the source. Review their license before shipping this as the
# default install for users. The installer defaults to PROVISIONER_MODE=docker
# until the user explicitly opts in to Dokploy-local.

services:
  dokploy-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dokploy
      POSTGRES_PASSWORD: ${DOKPLOY_DB_PASSWORD}
      POSTGRES_DB: dokploy
    volumes:
      - dokploy-pg-data:/var/lib/postgresql/data
    networks:
      - agenthub

  dokploy-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - dokploy-redis-data:/data
    networks:
      - agenthub

  dokploy:
    image: dokploy/dokploy:latest
    restart: unless-stopped
    depends_on:
      - dokploy-postgres
      - dokploy-redis
    environment:
      DATABASE_URL: postgres://dokploy:${DOKPLOY_DB_PASSWORD}@dokploy-postgres:5432/dokploy
      REDIS_URL: redis://dokploy-redis:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dokploy-data:/etc/dokploy
    networks:
      - agenthub
    labels:
      - traefik.enable=true
      - traefik.http.routers.dokploy.rule=Host(`dokploy.${DOMAIN}`)
      - traefik.http.routers.dokploy.entrypoints=websecure
      - traefik.http.routers.dokploy.tls.certresolver=le
      - traefik.http.services.dokploy.loadbalancer.server.port=3000

volumes:
  dokploy-pg-data:
  dokploy-redis-data:
  dokploy-data:
